name: Dependabot auto-merge

on:
  pull_request:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  label:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure auto-merge label exists
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create dependabot-auto-merge --repo ${{ github.repository }} --color 1f883d --description "Auto-merge once CI passes" 2>/dev/null || true

      - name: Add auto-merge label for patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label dependabot-auto-merge

  merge:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR for head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          PR=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" --jq '.[0] // empty')
          if [ -z "$PR" ]; then
            echo "No PR found for $HEAD_SHA"
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NUMBER=$(echo "$PR" | jq -r '.number')
          HAS_LABEL=$(echo "$PR" | jq -r '.labels[].name' | grep -Fx 'dependabot-auto-merge' || true)
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          if [ -n "$HAS_LABEL" ]; then
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --repo ${{ github.repository }} --squash --delete-branch

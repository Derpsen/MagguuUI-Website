name: Dependabot auto-merge

on:
  pull_request:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions: {}

jobs:
  label:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        # dependabot/fetch-metadata@v3.1.0
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure auto-merge label exists
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create dependabot-auto-merge --repo ${{ github.repository }} --color 1f883d --description "Auto-merge once CI passes" 2>/dev/null || true

      - name: Add auto-merge label for patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label dependabot-auto-merge

  merge:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve PR for head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          PRS=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls")
          PR=$(echo "$PRS" | jq -c --arg sha "$HEAD_SHA" \
            '.[] | select(.state == "open" and .user.login == "dependabot[bot]" and .base.ref == "main" and .head.sha == $sha)' \
            | head -n 1)
          if [ -z "$PR" ]; then
            echo "No open Dependabot PR found for $HEAD_SHA"
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NUMBER=$(echo "$PR" | jq -r '.number')
          HAS_LABEL=$(echo "$PR" | jq -r '.labels[].name' | grep -Fx 'dependabot-auto-merge' || true)
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          if [ -n "$HAS_LABEL" ]; then
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --repo ${{ github.repository }} --squash --delete-branch --match-head-commit "$HEAD_SHA"

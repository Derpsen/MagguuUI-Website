name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NUXT_OG_IMAGE_SECRET: ci-dummy-og-image-secret

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NUXT_JWT_SECRET: ci-dummy-secret-must-be-32-chars-long-XXXXXXXXXX
          NUXT_ADMIN_PASSWORD: ci-dummy

      - run: npm run verify:smoke

      - name: Install Playwright browser
        run: npm run test:install

      - name: Playwright smoke tests
        run: npm test

      - uses: actions/upload-artifact@v7
        with:
          name: public
          path: .output/public
          retention-days: 7

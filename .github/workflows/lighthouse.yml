name: Lighthouse

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NUXT_OG_IMAGE_SECRET: ci-dummy-og-image-secret
      NUXT_JWT_SECRET: ci-dummy-secret-must-be-32-chars-long-XXXXXXXXXX
      NUXT_ADMIN_PASSWORD: ci-dummy
    steps:
      - name: Checkout repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Start preview server
        run: |
          nohup npm run preview > preview.log 2>&1 &
          for attempt in {1..90}; do
            if curl --fail --silent http://localhost:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat preview.log
          exit 1

      - name: Run Lighthouse
        # treosh/lighthouse-ci-action@12.6.2
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18
        with:
          urls: |
            http://localhost:3000/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Stop preview server
        if: always()
        run: pkill -f "nuxt preview" || true
